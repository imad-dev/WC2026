name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_API_FOOTBALL_KEY: ${{ secrets.VITE_API_FOOTBALL_KEY }}
      VITE_WC2026_API_KEY: ${{ secrets.VITE_WC2026_API_KEY }}
      VITE_BALLDONTLIE_KEY: ${{ secrets.VITE_BALLDONTLIE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:coverage
      - run: npm audit --audit-level=high
      - run: npm run build
